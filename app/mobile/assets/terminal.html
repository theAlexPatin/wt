<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg, #0a0a0f);
      }
      #terminal {
        width: 100%;
        height: 100%;
      }
      .xterm {
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
    <script>
      let term = null;
      let fitAddon = null;
      let ws = null;

      function init(config) {
        const bgColor = config.paneColor || "#0a0a0f";
        document.documentElement.style.setProperty("--bg", bgColor);
        document.body.style.background = bgColor;

        fitAddon = new FitAddon.FitAddon();
        const webLinksAddon = new WebLinksAddon.WebLinksAddon();

        term = new Terminal({
          cursorBlink: true,
          cursorStyle: "bar",
          fontSize: 13,
          fontFamily: '"SF Mono", Menlo, "DejaVu Sans Mono", monospace',
          theme: {
            background: bgColor,
            foreground: "#e4e4e8",
            cursor: "#e4e4e8",
            selectionBackground: "rgba(255,255,255,0.2)",
          },
          allowProposedApi: true,
        });

        term.loadAddon(fitAddon);
        term.loadAddon(webLinksAddon);
        term.open(document.getElementById("terminal"));

        setTimeout(() => fitAddon.fit(), 50);

        term.onData((data) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(data);
          }
        });

        connect(config.wsUrl);

        const resizeObserver = new ResizeObserver(() => {
          if (fitAddon) {
            fitAddon.fit();
            sendResize();
          }
        });
        resizeObserver.observe(document.getElementById("terminal"));

        term.onResize(() => sendResize());
      }

      function connect(url) {
        ws = new WebSocket(url);

        ws.onopen = () => {
          sendResize();
          notifyRN({ type: "connected" });
        };

        ws.onmessage = (event) => {
          if (term) term.write(event.data);
        };

        ws.onclose = () => {
          notifyRN({ type: "disconnected" });
        };

        ws.onerror = () => {
          notifyRN({ type: "error" });
        };
      }

      function disconnect() {
        if (ws) {
          ws.close();
          ws = null;
        }
      }

      function sendResize() {
        if (term && ws && ws.readyState === WebSocket.OPEN) {
          ws.send(
            JSON.stringify({
              type: "resize",
              cols: term.cols,
              rows: term.rows,
            })
          );
        }
      }

      function sendInput(text) {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(text);
        }
      }

      function notifyRN(msg) {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify(msg));
        }
      }

      window.addEventListener("message", (event) => {
        try {
          const msg = JSON.parse(event.data);
          switch (msg.type) {
            case "init":
              init(msg);
              break;
            case "input":
              sendInput(msg.data);
              break;
            case "reconnect":
              disconnect();
              if (term) term.clear();
              connect(msg.wsUrl);
              break;
            case "disconnect":
              disconnect();
              break;
          }
        } catch {}
      });

      document.addEventListener("message", (event) => {
        try {
          const msg = JSON.parse(event.data);
          switch (msg.type) {
            case "init":
              init(msg);
              break;
            case "input":
              sendInput(msg.data);
              break;
            case "reconnect":
              disconnect();
              if (term) term.clear();
              connect(msg.wsUrl);
              break;
            case "disconnect":
              disconnect();
              break;
          }
        } catch {}
      });
    </script>
  </body>
</html>
